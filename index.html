<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☕%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pacific Barista - Premium Barista Training Academy. Master the art of coffee with expert-led courses and hands-on training." />
    <meta name="keywords" content="barista, coffee, training, academy, coffee courses, latte art, espresso" />
    <meta name="author" content="Pacific Barista" />
    <meta property="og:title" content="Pacific Barista | Premium Barista Training Academy" />
    <meta property="og:description" content="Master the art of coffee with expert-led courses and hands-on training." />
    <meta property="og:type" content="website" />
    <title>Pacific Barista | Premium Barista Training Academy</title>
  </head>
  <body>
    <div id="app">Loading...</div>
    <script>
      window._debug = [];
      window._debug.push('HTML loaded at ' + Date.now());
      window.onerror = function(msg, src, line, col, err) {
        var d = document.getElementById('app');
        d.innerHTML = '<pre style="color:red;padding:2rem;white-space:pre-wrap;font-size:14px;">ERROR: ' + msg + '\nLine: ' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('app');
        d.innerHTML = '<pre style="color:red;padding:2rem;white-space:pre-wrap;font-size:14px;">PROMISE ERROR: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre>';
      });
      setTimeout(function() {
        if (document.getElementById('app').innerHTML === 'Loading...') {
          document.getElementById('app').innerHTML = '<pre style="color:orange;padding:2rem;font-size:14px;">JS did NOT execute. Module may have failed to load.\nURL: ' + window.location.href + '\nCheck Network tab for failed requests.</pre>';
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
